<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mediation Desktop</title>
    <link rel="stylesheet" href="./styles/base.css" />
    <link rel="stylesheet" href="./styles/components.css" />
    <link rel="stylesheet" href="./styles/chat.css" />
    <link rel="stylesheet" href="./styles/views.css" />
  </head>
  <body>
    <section id="start-screen">
      <div id="start-card">
        <h1>Mediation</h1>
        <p class="muted">Start Agent runs OAuth, registers this mediation device with gateway, and launches the local commands-agent runtime.</p>
        <div class="row" style="margin-top: 14px;">
          <button id="start-btn" class="primary">Start</button>
        </div>
        <p id="start-status" class="muted small" style="margin-top: 10px;"></p>
      </div>
    </section>

    <div id="app-shell" class="page hidden">
      <main id="app-root"></main>
    </div>

    <div id="modal-root"></div>
    <div id="toast" class="hidden"></div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
